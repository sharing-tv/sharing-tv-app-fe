
<video
  #video
  autoplay
  muted
  playsinline
  webkit-playsinline
  controls
  style="width:100%; height:100%; background:black"
></video>

<div class="clock">
  {{ currentClock }}
</div>

<div class="controls">
  <button (click)="toggleMute()">🔇 Mute</button>
  <button (click)="full()">⛶ Fullscreen</button>
</div>
